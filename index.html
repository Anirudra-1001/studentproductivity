<!DOCTYPE html>
<html>

<head>
<title>Student Planner</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    margin:0;
}

h1{
    background:#1565c0;
    color:white;
    padding:12px;
    text-align:center;
}

/* Navigation bar */

nav{
    background:#0d47a1;
    padding:10px;
    text-align:center;
}

nav button{
    background:white;
    color:#0d47a1;
    border:none;
    padding:8px 15px;
    margin:5px;
    cursor:pointer;
    font-weight:bold;
}

/* Boxes */

.box{
    background:white;
    padding:15px;
    margin:15px;
}

/* Buttons */

button{
    background:#1565c0;
    color:white;
    border:none;
    padding:6px 10px;
}

/* Hide pages */

.page{
    display:none;
}

/* Home image */

.home-img{
    width:100%;
    border-radius:8px;
}

</style>
</head>

<body>

<h1>Student Productivity Hub</h1>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('planner')">Student Planner</button>
</nav>


<!-- HOME PAGE -->

<div id="home" class="page">

<div class="box">

<h2>Welcome</h2>

<p>This is Student Productivity Website.</p>

<img src="image.jpeg" class="home-img">

</div>

</div>


<!-- STUDENT PLANNER PAGE -->

<div id="planner" class="page">

<!-- Study Log -->

<div class="box">

<h2>Study Log</h2>

Subject:
<input type="text" id="subject">

Hours:
<input type="number" id="hours">

<button onclick="saveStudy()">Save</button>

<p id="output"></p>

</div>


<!-- Task Manager -->

<div class="box">

<h2>Task List</h2>

<input type="text" id="task">
<button onclick="addTask()">Add Task</button>

<ul id="list"></ul>

</div>


<!-- Exam Planner -->

<div class="box">

<h2>Exam Planner</h2>

Exam Name:
<input type="text" id="exam">

Date:
<input type="date" id="date">

<button onclick="addExam()">Add Exam</button>

<ul id="examList"></ul>

</div>

</div>


<script>

/* Page switch function */

function showPage(page){

document.getElementById("home").style.display="none";
document.getElementById("planner").style.display="none";

document.getElementById(page).style.display="block";

}

/* Default page */

showPage("home");


/* Study Log */

function saveStudy(){

var subject=document.getElementById("subject").value;
var hours=document.getElementById("hours").value;

document.getElementById("output").innerHTML =
"You studied "+subject+" for "+hours+" hours.";

}


/* Task List */

function addTask(){

var task=document.getElementById("task").value;

var li=document.createElement("li");

li.innerHTML=task;

document.getElementById("list").appendChild(li);

}


/* Exam Planner */

function addExam(){

var exam=document.getElementById("exam").value;
var date=document.getElementById("date").value;

var li=document.createElement("li");

li.innerHTML=exam+" - "+date;

document.getElementById("examList").appendChild(li);

}

</script>

</body>
</html>
